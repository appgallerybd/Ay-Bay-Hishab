<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f172a" />
<title>আয়-ব্যয় হিসাব</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { bangla: ['"Hind Siliguri"', 'sans-serif'] },
        colors: {
          base:'#0b1220', panel:'#111827', panel2:'#1f2937', line:'#1e293b',
          soft:'#e5e7eb', muted:'#94a3b8', brand:'#38bdf8',
          income:'#22c55e', expense:'#ef4444',
        },
        boxShadow: { card: '0 10px 30px -12px rgba(0,0,0,0.6)' }
      }
    }
  }
</script>

<style>
  html, body { font-family: 'Hind Siliguri', sans-serif; }
  body {
    background:
      radial-gradient(1000px 500px at 10% -10%, rgba(56,189,248,0.10), transparent 60%),
      radial-gradient(800px 400px at 100% 0%, rgba(34,197,94,0.08), transparent 60%),
      #0b1220;
    min-height: 100vh; color: #e5e7eb; -webkit-tap-highlight-color: transparent;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 999px; }
  .field { background:#0f172a; border:1px solid #1e293b; color:#e5e7eb; transition:all .2s ease; }
  .field:focus { outline:none; border-color:#38bdf8; box-shadow:0 0 0 3px rgba(56,189,248,.15); }
  .seg-btn.active { background:#38bdf8; color:#0b1220; font-weight:600; }
  @keyframes riseIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .rise { animation: riseIn .25s ease both; }
  .safe-b { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  input[type=number] { -moz-appearance:textfield; }
</style>
</head>
<body class="font-bangla">

<div class="max-w-xl mx-auto px-4 pt-6 safe-b">
  <header class="flex items-center justify-between mb-5">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-sky-400 to-emerald-400 flex items-center justify-center shadow-card">
        <i data-lucide="wallet" class="w-6 h-6 text-slate-900"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold leading-tight">আয়-ব্যয় হিসাব</h1>
        <p class="text-xs text-muted" id="todayLabel">আজকের হিসাব</p>
      </div>
    </div>
    <button id="clearAllBtn" class="text-xs text-muted hover:text-expense flex items-center gap-1 px-3 py-2 rounded-xl border border-line">
      <i data-lucide="trash-2" class="w-4 h-4"></i><span>সব মুছুন</span>
    </button>
  </header>

  <section class="rounded-2xl p-5 bg-gradient-to-br from-slate-800/80 to-slate-900/80 border border-line shadow-card mb-4">
    <p class="text-xs text-muted mb-1">মোট ব্যালেন্স</p>
    <div class="flex items-end justify-between">
      <h2 id="balance" class="text-3xl font-bold tracking-tight">৳ ০.০০</h2>
      <span class="text-xs text-muted flex items-center gap-1">
        <i data-lucide="activity" class="w-3.5 h-3.5"></i> রিয়েল-টাইম
      </span>
    </div>
  </section>

  <section class="grid grid-cols-2 gap-3 mb-6">
    <div class="rounded-2xl p-4 bg-panel border border-line shadow-card">
      <div class="flex items-center gap-2 mb-2">
        <div class="w-8 h-8 rounded-full bg-emerald-500/15 flex items-center justify-center">
          <i data-lucide="arrow-down-left" class="w-4 h-4 text-income"></i>
        </div>
        <p class="text-xs text-muted">মোট আয়</p>
      </div>
      <p id="totalIncome" class="text-lg font-semibold text-income">৳ ০.০০</p>
    </div>
    <div class="rounded-2xl p-4 bg-panel border border-line shadow-card">
      <div class="flex items-center gap-2 mb-2">
        <div class="w-8 h-8 rounded-full bg-red-500/15 flex items-center justify-center">
          <i data-lucide="arrow-up-right" class="w-4 h-4 text-expense"></i>
        </div>
        <p class="text-xs text-muted">মোট ব্যয়</p>
      </div>
      <p id="totalExpense" class="text-lg font-semibold text-expense">৳ ০.০০</p>
    </div>
  </section>

  <section class="rounded-2xl p-4 bg-panel border border-line shadow-card mb-6">
    <div class="flex items-center gap-2 mb-3">
      <i data-lucide="plus-circle" class="w-5 h-5 text-brand"></i>
      <h3 class="font-semibold">নতুন লেনদেন যুক্ত করুন</h3>
    </div>
    <form id="txForm" class="space-y-3">
      <div class="grid grid-cols-2 gap-2 p-1 bg-slate-900 border border-line rounded-xl">
        <button type="button" data-type="income" class="type-btn py-2.5 rounded-lg text-sm flex items-center justify-center gap-1.5 text-muted active">
          <i data-lucide="trending-up" class="w-4 h-4"></i> আয়
        </button>
        <button type="button" data-type="expense" class="type-btn py-2.5 rounded-lg text-sm flex items-center justify-center gap-1.5 text-muted">
          <i data-lucide="trending-down" class="w-4 h-4"></i> ব্যয়
        </button>
      </div>
      <div>
        <label class="text-xs text-muted mb-1 block">বিবরণ / খাত</label>
        <input id="desc" type="text" required maxlength="60" placeholder="যেমন: বাজার, বেতন, রিকশা ভাড়া"
               class="field w-full rounded-xl px-4 py-3 text-sm placeholder:text-slate-500" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-muted mb-1 block">টাকার পরিমাণ</label>
          <input id="amount" type="number" min="0" step="0.01" required inputmode="decimal" placeholder="০.০০"
                 class="field w-full rounded-xl px-4 py-3 text-sm placeholder:text-slate-500" />
        </div>
        <div>
          <label class="text-xs text-muted mb-1 block">তারিখ</label>
          <input id="date" type="date" required class="field w-full rounded-xl px-3 py-3 text-sm" />
        </div>
      </div>
      <button type="submit" class="w-full py-3.5 rounded-xl bg-gradient-to-r from-sky-400 to-emerald-400 text-slate-900 font-semibold text-sm flex items-center justify-center gap-2 active:scale-[0.99] transition">
        <i data-lucide="check-circle-2" class="w-4 h-4"></i> যুক্ত করুন
      </button>
    </form>
  </section>

  <section class="mb-3 flex items-center justify-between">
    <h3 class="font-semibold flex items-center gap-2">
      <i data-lucide="list" class="w-5 h-5 text-brand"></i> লেনদেনের ইতিহাস
    </h3>
    <span id="txCount" class="text-xs text-muted">০টি</span>
  </section>

  <div class="grid grid-cols-3 gap-2 p-1 bg-slate-900 border border-line rounded-xl mb-4">
    <button data-filter="all"     class="filter-btn seg-btn py-2 rounded-lg text-sm text-muted active">সব</button>
    <button data-filter="income"  class="filter-btn seg-btn py-2 rounded-lg text-sm text-muted">আয়</button>
    <button data-filter="expense" class="filter-btn seg-btn py-2 rounded-lg text-sm text-muted">ব্যয়</button>
  </div>

  <ul id="txList" class="space-y-2 mb-10"></ul>

  <div id="emptyState" class="hidden text-center py-10 text-muted">
    <div class="w-16 h-16 mx-auto mb-3 rounded-2xl bg-panel border border-line flex items-center justify-center">
      <i data-lucide="inbox" class="w-7 h-7"></i>
    </div>
    <p class="text-sm">এখনো কোনো লেনদেন যুক্ত করা হয়নি</p>
  </div>

  <footer class="text-center text-xs text-muted py-4">
    আপনার সব হিসাব এই ডিভাইসেই সংরক্ষিত থাকে 🔒
  </footer>
</div>

<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 border border-line text-soft text-sm px-4 py-2 rounded-xl shadow-card opacity-0 pointer-events-none transition-opacity"></div>

<script>
/* আয়-ব্যয় ট্র্যাকার — Vanilla JS + localStorage */
const STORAGE_KEY = 'ai_bay_hisab_v1';
let transactions = [];
let currentType = 'income';
let currentFilter = 'all';

const $ = (id) => document.getElementById(id);
const balanceEl=$('balance'), totalIncomeEl=$('totalIncome'), totalExpenseEl=$('totalExpense');
const txListEl=$('txList'), emptyStateEl=$('emptyState'), txCountEl=$('txCount');
const toastEl=$('toast'), todayLabelEl=$('todayLabel');

const bnDigits = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
const toBn = s => String(s).replace(/[0-9]/g, d => bnDigits[+d]);

function fmt(a){ const n=Number(a)||0; const p=n.toFixed(2).split('.'); p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,','); return '৳ '+toBn(p.join('.')); }
function bnDate(iso){ try{const d=new Date(iso); return toBn(d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}));}catch{return iso;} }
function todayISO(){ const d=new Date(); const off=d.getTimezoneOffset(); return new Date(d.getTime()-off*60000).toISOString().slice(0,10); }

let toastTimer;
function toast(m){ toastEl.textContent=m; toastEl.style.opacity='1'; clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.style.opacity='0',1800); }

function loadData(){ try{ const r=localStorage.getItem(STORAGE_KEY); transactions=r?JSON.parse(r):[]; if(!Array.isArray(transactions)) transactions=[]; }catch{ transactions=[]; } }
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions)); }

function computeTotals(){ let i=0,e=0; for(const t of transactions){ if(t.type==='income') i+=t.amount; else e+=t.amount; } return {income:i,expense:e,balance:i-e}; }

function renderTotals(){
  const {income,expense,balance}=computeTotals();
  balanceEl.textContent=fmt(balance);
  totalIncomeEl.textContent=fmt(income);
  totalExpenseEl.textContent=fmt(expense);
  balanceEl.classList.remove('text-income','text-expense','text-soft');
  balanceEl.classList.add(balance>0?'text-income':balance<0?'text-expense':'text-soft');
}

function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function renderList(){
  const filtered = transactions
    .filter(t => currentFilter==='all'?true:t.type===currentFilter)
    .sort((a,b)=> a.date!==b.date ? (a.date<b.date?1:-1) : b.id-a.id);
  txCountEl.textContent = toBn(filtered.length)+'টি';
  if(filtered.length===0){ txListEl.innerHTML=''; emptyStateEl.classList.remove('hidden'); return; }
  emptyStateEl.classList.add('hidden');
  txListEl.innerHTML = filtered.map(t=>{
    const inc=t.type==='income'; const sign=inc?'+':'−';
    const color=inc?'text-income':'text-expense';
    const bg=inc?'bg-emerald-500/10':'bg-red-500/10';
    const icon=inc?'arrow-down-left':'arrow-up-right';
    return `
      <li class="rise flex items-center gap-3 p-3 rounded-2xl bg-panel border border-line shadow-card">
        <div class="w-10 h-10 rounded-xl ${bg} flex items-center justify-center shrink-0">
          <i data-lucide="${icon}" class="w-5 h-5 ${color}"></i>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium truncate">${escapeHtml(t.desc)}</p>
          <p class="text-[11px] text-muted">${bnDate(t.date)}</p>
        </div>
        <div class="text-right"><p class="text-sm font-semibold ${color}">${sign} ${fmt(t.amount).replace('৳ ','৳')}</p></div>
        <button data-del="${t.id}" aria-label="মুছুন" class="ml-1 w-9 h-9 rounded-lg flex items-center justify-center text-muted hover:text-expense hover:bg-red-500/10 transition">
          <i data-lucide="trash-2" class="w-4 h-4"></i>
        </button>
      </li>`;
  }).join('');
  lucide.createIcons();
}

function renderAll(){ renderTotals(); renderList(); }

function addTransaction(e){
  e.preventDefault();
  const desc=$('desc').value.trim();
  const amount=parseFloat($('amount').value);
  const date=$('date').value;
  if(!desc||!amount||amount<=0||!date){ toast('সঠিক তথ্য দিন'); return; }
  transactions.push({ id:Date.now(), type:currentType, desc, amount, date });
  saveData(); renderAll();
  $('desc').value=''; $('amount').value=''; $('date').value=todayISO();
  toast(currentType==='income'?'আয় যুক্ত হয়েছে':'ব্যয় যুক্ত হয়েছে');
}

function deleteTransaction(id){ transactions=transactions.filter(t=>t.id!==id); saveData(); renderAll(); toast('লেনদেন মুছে ফেলা হয়েছে'); }

function clearAll(){
  if(transactions.length===0){ toast('মুছার মতো কিছু নেই'); return; }
  if(!confirm('আপনি কি নিশ্চিত? সব লেনদেন মুছে যাবে।')) return;
  transactions=[]; saveData(); renderAll(); toast('সব লেনদেন মুছে ফেলা হয়েছে');
}

document.addEventListener('DOMContentLoaded', ()=>{
  $('date').value = todayISO();
  todayLabelEl.textContent = 'আজ: '+bnDate(todayISO());
  loadData(); renderAll();

  $('txForm').addEventListener('submit', addTransaction);

  document.querySelectorAll('.type-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentType = btn.dataset.type;
      document.querySelectorAll('.type-btn').forEach(b=>{
        b.classList.remove('active','bg-income','bg-expense','text-white');
        b.classList.add('text-muted');
      });
      btn.classList.remove('text-muted');
      btn.classList.add('active','text-white', currentType==='income'?'bg-income':'bg-expense');
    });
  });
  document.querySelector('.type-btn[data-type="income"]').click();

  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    });
  });

  txListEl.addEventListener('click', e=>{
    const btn = e.target.closest('[data-del]');
    if(!btn) return;
    deleteTransaction(Number(btn.dataset.del));
  });

  $('clearAllBtn').addEventListener('click', clearAll);
  lucide.createIcons();
});
</script>
</body>
          </html>
